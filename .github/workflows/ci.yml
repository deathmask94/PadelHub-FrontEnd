name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-typecheck:
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: "https://padelhub-backend01.vercel.app"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build (misma verificacion que hace Vercel antes de desplegar)
        run: npm run build
